aid: bloomberg-terminal
name: Bloomberg Terminal
description: The Bloomberg Terminal (Bloomberg Professional Service) is the flagship
  product of Bloomberg LP, providing financial professionals with real-time market
  data, news, analytics, trading capabilities, and secure messaging through a unified
  workstation. The Terminal connects over 325,000 subscribers globally and is the
  standard infrastructure for financial markets professionals. Developers can access
  Terminal data programmatically via the Bloomberg Open API (BLPAPI).
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bloomberg-terminal/refs/heads/main/apis.yml
