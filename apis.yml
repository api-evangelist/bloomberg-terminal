apis:
- aid: bloomberg-terminal:blpapi
  name: Bloomberg Open API (BLPAPI)
  description: The Bloomberg Open API (BLPAPI) enables programmatic access to Bloomberg
    Terminal data from applications running on the same machine or connecting via
    Bloomberg's network. Provides real-time data subscriptions, reference data requests,
    historical data, and Bloomberg analytics. SDKs for Python, Java, C++, C#, and
    Perl.
  humanURL: https://bloomberg.github.io/blpapi-docs/
  baseURL: blpapi://localhost:8194
  tags:
  - BLPAPI
  - Core API
  - Market Data
  - Real-Time Subscriptions
  - Reference Data
  properties:
  - type: Documentation
    url: https://bloomberg.github.io/blpapi-docs/
  - type: GettingStarted
    url: https://data.bloomberglp.com/professional/sites/10/2017/03/BLPAPI-Core-Developer-Guide.pdf
  - type: GitHubRepository
    url: https://github.com/bloomberg/blpapi-node
  - type: SDKs
    url: https://pypi.org/project/blpapi/
    title: Python SDK
  - type: SDKs
    url: https://www.npmjs.com/package/blpapi
    title: Node.js SDK
- aid: bloomberg-terminal:bloomberg-excel-addin
  name: Bloomberg Excel Add-in
  description: Extends Bloomberg Terminal functionality into Microsoft Excel with
    BDP, BDH, BDS, and BQL formula functions for retrieving real-time, historical,
    and reference data directly in spreadsheet cells.
  humanURL: https://www.bloomberg.com/professional/solution/bloomberg-excel/
  baseURL: https://bloomberg.com/excel
  tags:
  - Excel
  - Add-in
  - BDP
  - BDH
  - Formulas
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/bloomberg-excel/
- aid: bloomberg-terminal:bloomberg-ib
  name: Bloomberg IB (Instant Bloomberg)
  description: Secure messaging platform built into the Bloomberg Terminal enabling
    real-time communication between financial professionals globally, with compliance
    archiving and monitoring capabilities.
  humanURL: https://www.bloomberg.com/professional/product/bloomberg-messaging/
  baseURL: blpapi://localhost:8194
  tags:
  - IB
  - Messaging
  - Compliance
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/product/bloomberg-messaging/
- aid: bloomberg-terminal:bloomberg-emsx
  name: Bloomberg EMSX
  description: Electronic trading and order management system integrated in the Bloomberg
    Terminal for routing orders to brokers across equities, fixed income, FX, and
    derivatives with FIX connectivity and algorithmic trading support.
  humanURL: https://www.bloomberg.com/professional/solution/emsx/
  baseURL: blpapi://localhost:8194
  tags:
  - EMSX
  - Order Management
  - Electronic Trading
  - FIX
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/emsx/
